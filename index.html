<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeadByteDawn - Side Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .link-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .link-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: #f97316; /* Cloudflare Orange accent */
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(249, 115, 22, 0.3);
        }
    </style>
</head>
<body class="text-slate-200 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md glass-card rounded-3xl p-8 md:p-10 shadow-2xl text-center">
        
        <div class="mb-8">
            <div class="w-20 h-20 mx-auto mb-4 bg-gradient-to-tr from-orange-500 to-amber-400 rounded-2xl flex items-center justify-center shadow-lg shadow-orange-500/20">
                <i data-lucide="cloud" class="w-10 h-10 text-white animate-pulse"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white">Project Hub</h1>
            <p class="text-sm text-slate-400 mt-1">Quick access to my Cloudflare deployments</p>
        </div>

        <div class="space-y-4">
            
            <a href="https://project1.pages.dev" target="_blank" rel="noopener noreferrer" class="link-btn flex items-center justify-between p-4 rounded-xl group">
                <div class="flex items-center space-x-4">
                    <div class="p-2 bg-orange-500/10 text-orange-400 rounded-lg group-hover:bg-orange-500/20 transition-colors">
                        <i data-lucide="globe" class="w-5 h-5"></i>
                    </div>
                    <span class="font-medium text-slate-200 group-hover:text-white transition-colors">Main Portfolio</span>
                </div>
                <i data-lucide="arrow-up-right" class="w-4 h-4 text-slate-500 group-hover:text-orange-400 transition-colors"></i>
            </a>

            <a href="https://project2.pages.dev" target="_blank" rel="noopener noreferrer" class="link-btn flex items-center justify-between p-4 rounded-xl group">
                <div class="flex items-center space-x-4">
                    <div class="p-2 bg-indigo-500/10 text-indigo-400 rounded-lg group-hover:bg-indigo-500/20 transition-colors">
                        <i data-lucide="code-2" class="w-5 h-5"></i>
                    </div>
                    <span class="font-medium text-slate-200 group-hover:text-white transition-colors">Web Applications</span>
                </div>
                <i data-lucide="arrow-up-right" class="w-4 h-4 text-slate-500 group-hover:text-indigo-400 transition-colors"></i>
            </a>

            <a href="https://project3.pages.dev" target="_blank" rel="noopener noreferrer" class="link-btn flex items-center justify-between p-4 rounded-xl group">
                <div class="flex items-center space-x-4">
                    <div class="p-2 bg-emerald-500/10 text-emerald-400 rounded-lg group-hover:bg-emerald-500/20 transition-colors">
                        <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                    </div>
                    <span class="font-medium text-slate-200 group-hover:text-white transition-colors">Analytics Dashboard</span>
                </div>
                <i data-lucide="arrow-up-right" class="w-4 h-4 text-slate-500 group-hover:text-emerald-400 transition-colors"></i>
            </a>

            <a href="https://github.com/yourusername" target="_blank" rel="noopener noreferrer" class="link-btn flex items-center justify-between p-4 rounded-xl group">
                <div class="flex items-center space-x-4">
                    <div class="p-2 bg-slate-500/10 text-slate-400 rounded-lg group-hover:bg-slate-500/20 transition-colors">
                        <i data-lucide="github" class="w-5 h-5"></i>
                    </div>
                    <span class="font-medium text-slate-200 group-hover:text-white transition-colors">GitHub Profile</span>
                </div>
                <i data-lucide="arrow-up-right" class="w-4 h-4 text-slate-500 group-hover:text-slate-300 transition-colors"></i>
            </a>

        </div>

        <div class="mt-8 pt-6 border-t border-slate-800/60 flex items-center justify-center space-x-2 text-xs text-slate-500">
            <span>Powered by</span>
            <span class="text-orange-500/80 font-semibold tracking-wider hover:text-orange-400 transition-colors">CLOUDFLARE</span>
        </div>

    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
